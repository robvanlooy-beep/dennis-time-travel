<!DOCTYPE html>
<html>
<head>

<body style="margin:0">

<a-scene 
embedded 
arjs="sourceType: webcam; debugUIEnabled: false;"

value="Dennis...\nJe hebt mijn graf gevonden.\nDe tijdlijn kan nog veranderen."
color="cyan"
align="center"
position="0 0.5 0"
scale="2 2 2">
</a-text>

</a-marker>

<a-entity camera></a-entity>

</a-scene>

</body>
</html>
